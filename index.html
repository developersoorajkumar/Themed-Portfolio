                width="18"
                height="18"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
              </svg>
            </span>

          <button
            class="nav__toggle"
            id="nav-toggle"

          <p class="hero__tagline">
            Customer Support &amp; Web Development Professional

          <p class="hero__subtitle">Web Developer</p>
